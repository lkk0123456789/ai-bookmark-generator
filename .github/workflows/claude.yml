name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Project Setup
        run: |
          npm install

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          
          # 額外權限設定
          additional_permissions: |
            actions: read

          # 給 Claude 的自定義指令
          custom_instructions: |
            This is an AI Bookmark Generator project. 
            The environment is already set up with 'npm install'.
            If you need to verify the UI or interact with a browser, please use the mcp__playwright tools.
            You can run the development server using 'npm start' if needed.

          # 啟用 Playwright MCP 伺服器 (讓 Claude 能開瀏覽器)
          mcp_config: |
            {
              "mcpServers": {
                "playwright": {
                  "command": "npx",
                  "args": ["@playwright/mcp@latest"]
                }
              }
            }

          # 授權工具權限 (很重要：沒加這個 Claude 會無法執行指令)
          allowed_tools: "Bash(npm:*),Bash(ls:*),Bash(cat:*),mcp__playwright__*"
